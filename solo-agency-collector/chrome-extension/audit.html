<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Collector Audit</title>
  <style>
    :root {
      --bg: #0e1116;
      --panel: #161b22;
      --panel-2: #1c232c;
      --border: #2a313c;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #4493f8;
      --url: #7ee787;
      --warn: #f0883e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px 20px 64px; }
    header.top { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 4px; }
    h1 { font-size: 20px; margin: 0; }
    .sub { color: var(--muted); font-size: 13px; word-break: break-all; }
    .toolbar { display: flex; gap: 8px; margin: 16px 0; flex-wrap: wrap; }
    button {
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 8px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin: 16px 0; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
    .card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
    .card .value { font-size: 22px; font-weight: 700; margin-top: 2px; }
    .card .value.small { font-size: 15px; font-weight: 600; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; font-weight: 700; border: 1px solid var(--border); }
    .badge.feed { color: var(--accent); border-color: var(--accent); }
    .badge.website { color: var(--url); border-color: var(--url); }
    h2 { font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin: 28px 0 10px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: right; padding: 7px 10px; border-bottom: 1px solid var(--border); }
    th:first-child, td:first-child { text-align: left; }
    th { color: var(--muted); font-weight: 600; }
    pre {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.6;
      max-height: 60vh;
      overflow: auto;
    }
    pre .u { color: var(--url); }
    .empty { color: var(--muted); padding: 60px 20px; text-align: center; font-size: 15px; }
    .empty b { color: var(--text); }
    .hint { color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>
  <div class="wrap" id="root"></div>
  <script src="audit.js"></script>
</body>
</html>
